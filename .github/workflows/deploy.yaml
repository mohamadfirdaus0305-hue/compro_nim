name: Deploy Web Static to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - 'web-statis/**'
      - '.github/workflows/deploy.yaml'

jobs:
  build-and-push:
    name: Build & Push Image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Build hanya dari folder web-statis (bukan root repo)
          context: ./web-statis
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/compro_nim:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/compro_nim:${{ github.sha }}

  deploy-to-ec2:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH — Pull & restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            # Pull image terbaru
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/compro_nim:latest

            # Hentikan & hapus container lama jika ada
            docker rm -f container-statis || true

            # Jalankan container baru
            docker run -d \
              --name container-statis \
              --restart always \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/compro_nim:latest

            # Bersihkan image lama yang tidak terpakai
            docker image prune -f
